<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资治通鉴 Wiki — 司马光百科</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="#" class="brand">资治通鉴 Wiki</a>
    <form class="topnav-search" onsubmit="event.preventDefault();const v=this.q.value.trim();if(v)location.hash=encodeURIComponent(v);">
      <input id="topnav-q" name="q" type="search" placeholder="搜索页面…" autocomplete="off" list="topnav-pages">
      <datalist id="topnav-pages"></datalist>
    </form>
    <span id="crumb" class="crumb"></span>
    <span class="spacer"></span>
    <a href="#Special%3AAll" class="topnav-link">所有页面</a>
    <a href="#Special%3ARecent" class="topnav-link">最近修订</a>
    <a href="#About" class="topnav-link">关于</a>
    <a href="https://github.com/baojie/tongjian/issues/new" class="topnav-link" target="_blank" rel="noopener">提想法</a>
    <a href="https://github.com/baojie/tongjian" class="topnav-link" target="_blank" rel="noopener">GitHub</a>
    <button id="autolink-toggle" class="topnav-link topnav-btn" title="自动链接：正文中已知词条名自动变为链接">自动链接：关</button>
    <span id="status" class="status"></span>
  </div>
</nav>

<main class="page" id="page-root">
  <aside class="toc-sidebar" id="toc-sidebar" hidden></aside>
  <aside class="sidebar" id="sidebar" hidden>
    <div class="infobox" id="infobox" hidden></div>
    <figure class="sidebar-portrait" id="sidebar-portrait" hidden></figure>
  </aside>
  <article id="article">
    <p class="loading">载入中…</p>
  </article>
</main>

<footer>
  <small>
    <span id="src-info"></span>
    <span id="broken-info"></span>
    <span class="footer-license">
      内容基于 <a href="https://creativecommons.org/licenses/by-sa/4.0/deed.zh" target="_blank" rel="noopener license">CC BY-SA 4.0</a> 授权发布。《资治通鉴》原著为公版作品，本 Wiki 为 AI 辅助整理的二次创作。
    </span>
  </small>
</footer>

<script type="module" src="js/core.js?v=20260430a"></script>
<script>
fetch('pages.lite.json').then(r=>r.json()).then(data=>{
  const dl = document.getElementById('topnav-pages');
  const pages = data.pages ? Object.values(data.pages) : [];
  pages.forEach(p=>{
    const o = document.createElement('option');
    o.value = p.label || p.id || '';
    dl.appendChild(o);
    (p.aliases||[]).forEach(a=>{
      if(typeof a === 'string'){
        const ao = document.createElement('option'); ao.value = a; dl.appendChild(ao);
      }
    });
  });
}).catch(()=>{});

// 自动链接开关
(function(){
  const btn = document.getElementById('autolink-toggle');
  if (!btn) return;
  function syncBtn(on) { btn.textContent = '自动链接：' + (on ? '开' : '关'); btn.classList.toggle('active', on); }
  // 读初始状态（core 尚未挂载，直接读 localStorage）
  let on = false;
  try { on = JSON.parse(localStorage.getItem('wiki_settings') || '{}').autoWikilink === true; } catch {}
  syncBtn(on);
  btn.addEventListener('click', () => {
    const core = window.__wiki;
    const next = !(core ? core.settings.autoWikilink : on);
    if (core) core.setSetting('autoWikilink', next);
    else { try { localStorage.setItem('wiki_settings', JSON.stringify({autoWikilink: next})); } catch {} }
    on = next;
    syncBtn(next);
    // 重渲当前页面使设置生效
    if (core && location.hash.length > 1) { const h = location.hash; location.hash = ''; location.hash = h; }
  });
})();
</script>
</body>
</html>
